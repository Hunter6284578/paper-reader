name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Test and build server
        working-directory: server
        run: npm test
      - name: Audit server production dependencies
        working-directory: server
        run: npm audit --omit=dev
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Build client
        working-directory: client
        run: npm run build
      - name: Test client offline flows
        working-directory: client
        run: npm test
      - name: Validate Python parser
        run: python -m py_compile server/python/docling_parser.py
      - name: Audit client production dependencies
        working-directory: client
        run: npm audit --omit=dev

  android-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npx cap sync android
        working-directory: client
      - run: bash ./gradlew testDebugUnitTest
        working-directory: client/android
