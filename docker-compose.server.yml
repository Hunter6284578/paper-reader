services:
  app:
    build: .
    container_name: paper-reader
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - app-data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    mem_limit: 2g
    memswap_limit: 3g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-data:
    driver: local
