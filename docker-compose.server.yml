services:
  app:
    build: .
    container_name: paper-reader
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - app-data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    mem_limit: 2g
    memswap_limit: 3g

volumes:
  app-data:
    driver: local
