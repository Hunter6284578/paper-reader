services:
  app:
    build: .
    container_name: paper-reader
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app-data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY:?SETTINGS_ENCRYPTION_KEY must be set}
    mem_limit: 2g
    memswap_limit: 3g

  nginx:
    image: nginx:1.26-alpine
    container_name: paper-reader-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - app-data:/data:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  app-data:
    driver: local
